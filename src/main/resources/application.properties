# ============================================================
# GeoSecure Attendance System - application.properties
# ============================================================

# --- Application ---
spring.application.name=attendance-system
server.servlet.context-path=/

# --- MySQL Datasource ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.pool-name=GeoSecureHikariPool

# --- JPA / Hibernate ---
# schema.sql is the single source of truth; Hibernate only validates entities against it
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# --- JWT Configuration ---
# Override jwt.secret / jwt.refresh-secret via environment variables in production.
# Each must be a Base64-encoded string of at least 256 bits (32 bytes) for HS256.
jwt.secret=${JWT_SECRET:Z2Vvc2VjdXJlX2RlZmF1bHRfc2VjcmV0X2tleV9mb3JfZGV2X29ubHlfY2hhbmdlX2luX3Byb2Q=}
jwt.expiration-ms=28800000
# 8 hours
jwt.refresh-secret=${JWT_REFRESH_SECRET:Z2Vvc2VjdXJlX3JlZnJlc2hfc2VjcmV0X2tleV9mb3JfZGV2X29ubHlfY2hhbmdlX2luX3Byb2Q=}
jwt.refresh-expiration-ms=604800000
# 7 days
jwt.issuer=geosecure-attendance-system

# --- GeoSecure Business Rules ---
geosecure.qr.expiry-seconds=300
geosecure.geofence.radius-meters=1000
geosecure.attendance.defaulter-threshold=75

# --- Phase 3: automatic session-close sweep (AttendanceSessionScheduler) ---
# How often (ms) the sweep checks for expired-but-still-active QR sessions.
geosecure.scheduler.sweep-rate-ms=15000

# --- CORS ---
# Frontend is now an independent project (GeoSecure/frontend), served by any
# static file server. 5500 = VS Code "Live Server" default, 5000/8000 = common
# `python -m http.server`/`serve` defaults. Add your actual frontend origin
# here if it differs.

# --- Password Encoding ---
geosecure.security.bcrypt-strength=12

# --- File Upload (profile photos) ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# --- Jackson (JSON) ---
spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.default-property-inclusion=non_null

# --- Logging ---
logging.level.root=INFO
logging.level.com.geosecure.attendance=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
